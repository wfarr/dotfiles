[user]
name = "Will Farrington"
email = "wcfarrington@gmail.com"

[aliases]
# tug = ["bookmark", "move", "--from", "closest_bookmark(@-)", "--to", "@-"]
tug = ["bookmark", "advance"]

pr = ["util", "exec", "--", "bash", "-c", """
#!/usr/bin/env bash
set -euo pipefail

branchname="$(jj bookmark list -r 'closest_bookmark(@)' | cut -f1 -d:)"

jj git push -r "${branchname}"
jj git export

env GIT_DIR="$(jj git root)" gh pr create --head="${branchname}" "${@}"
""", ""]

[revset-aliases]
'closest_bookmark(to)' = 'heads(::to & bookmarks())'

[ui]
diff-editor = "gitpatch"

[ui.diff]
ui.diff-formatter = "difft"

# via @dubi steinkek in the jj discord
[merge-tools.gitpatch]
program = "sh"
edit-args = ["-c", '''
  set -eu
  rm -f "$right/JJ-INSTRUCTIONS"
  git -C "$left" init -q
  git -C "$left" add -A
  git -C "$left" commit -q -m baseline --allow-empty
  mv "$left/.git" "$right"
  git -C "$right" add --intent-to-add -A
  git -C "$right" add -p
  git -C "$right" diff-index --quiet --cached HEAD && { echo "No changes done, aborting split."; exit 1; }
  git -C "$right" commit -q -m split
  git -C "$right" restore . # undo changes in modified files
  git -C "$right" reset .   # undo --intent-to-add
  git -C "$right" clean -q -df # remove untracked files
''',
]
merge-args = ["-c", "echo gitpatch cannot be used as a diff tool"]
diff-args = ["-c", "echo gitpatch cannot be used as a diff tool"]

[revsets]
log = '@ | ancestors(trunk()..(visible_heads() & mine()), 2) | trunk()'

[templates]
# git commit --verbose, kinda:
draft_commit_description = '''
concat(
  description,
  surround(
    "\nJJ: This commit contains the following changes:\n", "",
    indent("JJ:     ", diff.stat(72)),
  ),
  "\nJJ: ignore-rest\n",
  diff.git(),
)
'''

[remotes.origin]
auto-track-bookmarks = "glob:*"
